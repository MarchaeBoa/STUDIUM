<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="40%" stop-color="#4a1942"/>
      <stop offset="70%" stop-color="#d4654a"/>
      <stop offset="100%" stop-color="#f4a259"/>
    </linearGradient>
    <radialGradient id="warm" cx="30%" cy="60%">
      <stop offset="0%" stop-color="#f4a259" stop-opacity=".25"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Window/sky -->
  <rect fill="url(#sky)" width="800" height="600"/>
  <rect fill="url(#warm)" width="800" height="600"/>
  <!-- Desk surface -->
  <rect x="0" y="340" width="800" height="260" fill="#3d2e1f"/>
  <rect x="0" y="335" width="800" height="8" fill="#5a4230"/>
  <!-- Window frame -->
  <rect x="0" y="0" width="300" height="340" fill="none" stroke="#5a4230" stroke-width="12"/>
  <line x1="150" y1="0" x2="150" y2="340" stroke="#5a4230" stroke-width="6"/>
  <!-- Plant silhouette -->
  <circle cx="60" cy="100" r="20" fill="#2d5a3d" opacity=".7"/>
  <circle cx="80" cy="80" r="15" fill="#1a4a2e" opacity=".6"/>
  <circle cx="45" cy="85" r="18" fill="#2d5a3d" opacity=".5"/>
  <rect x="55" y="120" width="12" height="30" fill="#4a3525"/>
  <!-- Desk lamp -->
  <rect x="100" y="180" width="4" height="160" fill="#333" transform="rotate(-15 102 340)"/>
  <ellipse cx="80" cy="185" rx="30" ry="15" fill="#1a1a2e" opacity=".8"/>
  <circle cx="80" cy="185" r="8" fill="#f4d03f" opacity=".8"/>
  <!-- Books stack -->
  <rect x="40" y="350" width="100" height="20" rx="2" fill="#1a4a2e"/>
  <rect x="42" y="332" width="96" height="20" rx="2" fill="#d4654a"/>
  <rect x="44" y="314" width="92" height="20" rx="2" fill="#2563EB"/>
  <rect x="46" y="296" width="88" height="20" rx="2" fill="#059669"/>
  <!-- Book labels -->
  <text x="60" y="310" font-family="sans-serif" font-size="7" fill="#fff" font-weight="bold">PHYSICS</text>
  <text x="58" y="328" font-family="sans-serif" font-size="7" fill="#fff" font-weight="bold">CHEMISTRY</text>
  <text x="60" y="346" font-family="sans-serif" font-size="7" fill="#fff" font-weight="bold">BIOLOGY</text>
  <text x="62" y="364" font-family="sans-serif" font-size="7" fill="#fff" font-weight="bold">MATH</text>
  <!-- Notebook open -->
  <rect x="220" y="360" width="300" height="200" rx="4" fill="#f8f4ec" transform="rotate(-2 370 460)"/>
  <rect x="370" y="358" width="2" height="204" fill="#d4c4a8" transform="rotate(-2 370 460)"/>
  <!-- Notebook lines -->
  <line x1="240" y1="385" x2="360" y2="383" stroke="#bfa" stroke-width="0.5"/>
  <line x1="240" y1="400" x2="350" y2="398" stroke="#bfa" stroke-width="0.5"/>
  <line x1="240" y1="415" x2="340" y2="413" stroke="#bfa" stroke-width="0.5"/>
  <line x1="380" y1="385" x2="500" y2="383" stroke="#bfa" stroke-width="0.5"/>
  <line x1="380" y1="400" x2="490" y2="398" stroke="#bfa" stroke-width="0.5"/>
  <!-- Pen cup -->
  <rect x="560" y="300" width="50" height="60" rx="4" fill="#4a3525"/>
  <line x1="570" y1="260" x2="570" y2="300" stroke="#d4654a" stroke-width="3"/>
  <line x1="580" y1="270" x2="580" y2="300" stroke="#2563EB" stroke-width="3"/>
  <line x1="590" y1="265" x2="590" y2="300" stroke="#059669" stroke-width="3"/>
  <!-- Mug -->
  <rect x="170" y="355" width="35" height="40" rx="4" fill="#f8f4ec" stroke="#d4c4a8" stroke-width="1.5"/>
  <ellipse cx="187" cy="358" rx="16" ry="4" fill="#f0e6d3"/>
  <!-- Coffee steam -->
  <path d="M180 345 Q183 335 180 325" fill="none" stroke="#fff" stroke-width="1" opacity=".3"/>
  <path d="M190 348 Q193 338 190 328" fill="none" stroke="#fff" stroke-width="1" opacity=".2"/>
  <!-- Laptop -->
  <rect x="500" y="200" width="260" height="160" rx="8" fill="#1a1a2e"/>
  <rect x="508" y="208" width="244" height="144" rx="4" fill="#0a192f"/>
  <!-- Screen glow -->
  <rect x="520" y="220" width="100" height="8" rx="2" fill="#f4a259" opacity=".5"/>
  <rect x="520" y="240" width="150" height="6" rx="2" fill="#fff" opacity=".1"/>
  <rect x="520" y="255" width="120" height="6" rx="2" fill="#fff" opacity=".08"/>
  <text x="560" y="300" font-family="sans-serif" font-size="10" fill="#6EE7B7" opacity=".6">lofi study focus</text>
  <!-- Laptop base -->
  <path d="M490 360 L770 360 L780 375 L480 375 Z" fill="#2d2d3d"/>
  <!-- Candle -->
  <rect x="680" y="380" width="40" height="50" rx="6" fill="#f8f4ec" opacity=".8"/>
  <rect x="698" y="370" width="4" height="12" fill="#f4d03f"/>
  <ellipse cx="700" cy="368" rx="5" ry="7" fill="#f4a259" opacity=".7"/>
  <!-- Warm ambient overlay -->
  <rect width="800" height="600" fill="#f4a259" opacity=".03"/>
  <!-- Post-it notes on wall -->
  <rect x="320" y="40" width="80" height="60" fill="#f8f4ec" transform="rotate(2 360 70)" opacity=".8"/>
  <text x="332" y="68" font-family="sans-serif" font-size="8" fill="#333" transform="rotate(2 360 70)">DREAM BIG</text>
  <rect x="420" y="50" width="80" height="60" fill="#ffe4b5" transform="rotate(-1 460 80)" opacity=".8"/>
  <text x="430" y="78" font-family="sans-serif" font-size="8" fill="#333" transform="rotate(-1 460 80)">WORK HARD</text>
  <rect x="370" y="120" width="90" height="60" fill="#d4efc7" transform="rotate(1 415 150)" opacity=".8"/>
  <text x="378" y="148" font-family="sans-serif" font-size="7" fill="#333" transform="rotate(1 415 150)">TRUST THE</text>
  <text x="378" y="160" font-family="sans-serif" font-size="7" fill="#333" transform="rotate(1 415 150)">PROCESS</text>
</svg>