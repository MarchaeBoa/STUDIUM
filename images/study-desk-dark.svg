<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1a14"/>
      <stop offset="50%" stop-color="#1a2e23"/>
      <stop offset="100%" stop-color="#0d2818"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#34D399" stop-opacity=".15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect fill="url(#bg)" width="800" height="600"/>
  <rect fill="url(#glow)" width="800" height="600"/>
  <!-- Desk -->
  <rect x="0" y="380" width="800" height="220" fill="#2a1f14" rx="0"/>
  <rect x="0" y="375" width="800" height="8" fill="#3d2e1f" rx="0"/>
  <!-- Laptop -->
  <rect x="220" y="140" width="360" height="220" rx="12" fill="#1a1a2e"/>
  <rect x="230" y="150" width="340" height="200" rx="6" fill="#0a192f"/>
  <!-- Screen content -->
  <rect x="250" y="170" width="120" height="12" rx="3" fill="#059669" opacity=".8"/>
  <rect x="250" y="195" width="200" height="8" rx="2" fill="#fff" opacity=".15"/>
  <rect x="250" y="210" width="160" height="8" rx="2" fill="#fff" opacity=".1"/>
  <rect x="250" y="240" width="80" height="24" rx="4" fill="#059669" opacity=".6"/>
  <rect x="340" y="240" width="80" height="24" rx="4" fill="#34D399" opacity=".3"/>
  <!-- Clock on screen -->
  <text x="420" y="190" font-family="monospace" font-size="28" fill="#6EE7B7" opacity=".7">06:26</text>
  <!-- Laptop base -->
  <path d="M200 360 L600 360 L620 380 L180 380 Z" fill="#2d2d3d"/>
  <!-- Notebook -->
  <rect x="280" y="400" width="240" height="160" rx="4" fill="#f5f0e8" transform="rotate(-3 400 480)"/>
  <line x1="300" y1="420" x2="490" y2="415" stroke="#c4b89a" stroke-width="0.5" transform="rotate(-3 400 480)"/>
  <line x1="300" y1="435" x2="490" y2="430" stroke="#c4b89a" stroke-width="0.5" transform="rotate(-3 400 480)"/>
  <line x1="300" y1="450" x2="490" y2="445" stroke="#c4b89a" stroke-width="0.5" transform="rotate(-3 400 480)"/>
  <line x1="300" y1="465" x2="460" y2="460" stroke="#c4b89a" stroke-width="0.5" transform="rotate(-3 400 480)"/>
  <!-- Pen -->
  <line x1="510" y1="410" x2="540" y2="520" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <!-- Light bar -->
  <rect x="250" y="90" width="300" height="6" rx="3" fill="#f0e6d3" opacity=".6"/>
  <rect x="250" y="80" width="300" height="12" rx="6" fill="#e8dcc8" opacity=".3"/>
  <!-- Ambient light glow -->
  <ellipse cx="400" cy="100" rx="200" ry="80" fill="#f5e6c8" opacity=".04"/>
  <!-- Hand/watch hint -->
  <ellipse cx="380" cy="470" rx="40" ry="25" fill="#c4946b" opacity=".5"/>
</svg>