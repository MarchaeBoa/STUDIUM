<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="desk2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0e6d3"/>
      <stop offset="100%" stop-color="#e8dcc8"/>
    </linearGradient>
  </defs>
  <!-- Desk -->
  <rect fill="url(#desk2)" width="800" height="600"/>
  <!-- Paper - Arrhenius equation -->
  <rect x="20" y="20" width="380" height="280" fill="#fff" transform="rotate(-5 200 160)"/>
  <rect x="30" y="30" width="360" height="30" fill="#f0f0f0" transform="rotate(-5 200 160)"/>
  <text x="40" y="52" font-family="serif" font-size="11" fill="#333" font-weight="bold" transform="rotate(-5 200 160)">SECTION 6 - The Arrhenius Equation</text>
  <rect x="50" y="80" width="150" height="50" fill="#f8f8f8" stroke="#ddd" stroke-width="1" rx="4" transform="rotate(-5 200 160)"/>
  <text x="75" y="108" font-family="serif" font-size="16" fill="#333" transform="rotate(-5 200 160)">k = Ae^(-Ea/RT)</text>
  <!-- Notebook grid paper -->
  <rect x="280" y="150" width="350" height="400" fill="#fffef5" transform="rotate(3 455 350)"/>
  <!-- Grid lines -->
  <g transform="rotate(3 455 350)" opacity=".15">
    <line x1="280" y1="170" x2="630" y2="170" stroke="#9ac" stroke-width=".5"/>
    <line x1="280" y1="190" x2="630" y2="190" stroke="#9ac" stroke-width=".5"/>
    <line x1="280" y1="210" x2="630" y2="210" stroke="#9ac" stroke-width=".5"/>
    <line x1="280" y1="230" x2="630" y2="230" stroke="#9ac" stroke-width=".5"/>
    <line x1="280" y1="250" x2="630" y2="250" stroke="#9ac" stroke-width=".5"/>
    <line x1="280" y1="270" x2="630" y2="270" stroke="#9ac" stroke-width=".5"/>
    <line x1="280" y1="290" x2="630" y2="290" stroke="#9ac" stroke-width=".5"/>
  </g>
  <!-- Cell diagram (rough) -->
  <circle cx="400" cy="220" r="40" fill="none" stroke="#d44" stroke-width="2" transform="rotate(3 455 350)"/>
  <circle cx="400" cy="220" r="15" fill="#d44" opacity=".2" transform="rotate(3 455 350)"/>
  <!-- Venn diagram -->
  <circle cx="530" cy="220" r="30" fill="#d44" opacity=".15" transform="rotate(3 455 350)"/>
  <circle cx="555" cy="220" r="30" fill="#4a9" opacity=".15" transform="rotate(3 455 350)"/>
  <!-- Handwritten text hints -->
  <text x="300" y="190" font-family="cursive" font-size="9" fill="#333" opacity=".6" transform="rotate(3 455 350)">B.1.3 vesicles</text>
  <text x="300" y="310" font-family="cursive" font-size="10" fill="#d44" opacity=".7" transform="rotate(3 455 350)">FLUID MOSAIC MODEL</text>
  <text x="300" y="330" font-family="cursive" font-size="8" fill="#333" opacity=".5" transform="rotate(3 455 350)">phospholipid bilayer</text>
  <!-- Atom drawing -->
  <circle cx="600" cy="450" r="8" fill="#339" opacity=".3"/>
  <ellipse cx="600" cy="450" rx="40" ry="15" fill="none" stroke="#339" stroke-width="1" opacity=".4" transform="rotate(30 600 450)"/>
  <ellipse cx="600" cy="450" rx="40" ry="15" fill="none" stroke="#339" stroke-width="1" opacity=".4" transform="rotate(-30 600 450)"/>
  <ellipse cx="600" cy="450" rx="40" ry="15" fill="none" stroke="#339" stroke-width="1" opacity=".4"/>
  <!-- Glasses -->
  <ellipse cx="470" cy="380" rx="35" ry="25" fill="none" stroke="#4a3525" stroke-width="3"/>
  <ellipse cx="540" cy="380" rx="35" ry="25" fill="none" stroke="#4a3525" stroke-width="3"/>
  <line x1="505" y1="378" x2="505" y2="378" stroke="#4a3525" stroke-width="3"/>
  <path d="M505 375 Q510 370 505 375" fill="none" stroke="#4a3525" stroke-width="2.5"/>
  <!-- Calculator -->
  <rect x="650" y="200" width="120" height="200" rx="8" fill="#e8e0d4"/>
  <rect x="660" y="210" width="100" height="40" rx="4" fill="#c4ddc4"/>
  <text x="710" y="238" font-family="monospace" font-size="16" fill="#333" text-anchor="middle">3.14</text>
  <!-- Calculator buttons -->
  <g fill="#f5f0e8">
    <rect x="665" y="260" width="20" height="16" rx="3"/>
    <rect x="690" y="260" width="20" height="16" rx="3"/>
    <rect x="715" y="260" width="20" height="16" rx="3"/>
    <rect x="740" y="260" width="20" height="16" rx="3"/>
    <rect x="665" y="282" width="20" height="16" rx="3"/>
    <rect x="690" y="282" width="20" height="16" rx="3"/>
    <rect x="715" y="282" width="20" height="16" rx="3"/>
    <rect x="740" y="282" width="20" height="16" rx="3" fill="#f4a259"/>
  </g>
  <!-- Pen -->
  <line x1="450" y1="420" x2="440" y2="500" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tablet hint -->
  <rect x="20" y="350" width="200" height="220" rx="12" fill="#1a1a2e"/>
  <rect x="28" y="358" width="184" height="204" rx="8" fill="#fff"/>
  <rect x="40" y="370" width="100" height="8" rx="2" fill="#333" opacity=".15"/>
  <rect x="40" y="385" width="150" height="6" rx="2" fill="#333" opacity=".1"/>
  <rect x="40" y="397" width="130" height="6" rx="2" fill="#333" opacity=".1"/>
  <!-- Laptop in background -->
  <rect x="400" y="0" width="400" height="150" fill="#1a1a2e" rx="6"/>
  <rect x="408" y="8" width="384" height="134" rx="3" fill="#fff"/>
  <rect x="420" y="20" width="200" height="8" rx="2" fill="#059669" opacity=".3"/>
  <rect x="420" y="35" width="300" height="6" rx="2" fill="#333" opacity=".08"/>
  <rect x="420" y="48" width="250" height="6" rx="2" fill="#333" opacity=".06"/>
</svg>