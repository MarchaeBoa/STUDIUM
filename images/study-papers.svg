<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect fill="url(#bg3)" width="800" height="600"/>
  <!-- Desk -->
  <rect x="0" y="280" width="800" height="320" fill="#e8dcc8"/>
  <rect x="0" y="276" width="800" height="6" fill="#d4c4a8"/>
  <!-- Papers scattered -->
  <rect x="50" y="300" width="350" height="250" fill="#fff" transform="rotate(-8 225 425)"/>
  <rect x="100" y="310" width="340" height="250" fill="#fff" transform="rotate(-2 270 435)"/>
  <rect x="80" y="320" width="360" height="240" fill="#fff" transform="rotate(3 260 440)"/>
  <!-- Highlighted text on papers -->
  <g transform="rotate(3 260 440)">
    <rect x="100" y="340" width="200" height="10" rx="2" fill="#4dd9f0" opacity=".3"/>
    <rect x="100" y="358" width="280" height="8" rx="2" fill="#333" opacity=".1"/>
    <rect x="100" y="372" width="260" height="8" rx="2" fill="#333" opacity=".1"/>
    <rect x="100" y="386" width="240" height="8" rx="2" fill="#333" opacity=".1"/>
    <rect x="100" y="400" width="180" height="10" rx="2" fill="#4dd9f0" opacity=".3"/>
    <rect x="100" y="418" width="290" height="8" rx="2" fill="#333" opacity=".1"/>
    <rect x="100" y="432" width="270" height="8" rx="2" fill="#333" opacity=".1"/>
    <rect x="100" y="446" width="200" height="8" rx="2" fill="#333" opacity=".1"/>
    <rect x="100" y="460" width="160" height="10" rx="2" fill="#f4a259" opacity=".3"/>
    <rect x="100" y="478" width="300" height="8" rx="2" fill="#333" opacity=".1"/>
    <rect x="100" y="492" width="250" height="8" rx="2" fill="#333" opacity=".1"/>
  </g>
  <!-- Laptop in background -->
  <rect x="350" y="60" width="420" height="260" rx="10" fill="#111"/>
  <rect x="360" y="70" width="400" height="240" rx="6" fill="#1a3a4a"/>
  <!-- Browser tab -->
  <rect x="370" y="78" width="380" height="24" fill="#234" rx="4"/>
  <circle cx="385" cy="90" r="5" fill="#f44" opacity=".6"/>
  <circle cx="400" cy="90" r="5" fill="#fa0" opacity=".6"/>
  <circle cx="415" cy="90" r="5" fill="#4a4" opacity=".6"/>
  <!-- Web content -->
  <rect x="370" y="106" width="380" height="196" fill="#fff"/>
  <rect x="385" y="120" width="200" height="10" rx="2" fill="#059669" opacity=".5"/>
  <rect x="385" y="140" width="300" height="6" rx="2" fill="#333" opacity=".1"/>
  <rect x="385" y="155" width="280" height="6" rx="2" fill="#333" opacity=".1"/>
  <rect x="385" y="170" width="260" height="6" rx="2" fill="#333" opacity=".1"/>
  <rect x="385" y="190" width="150" height="20" rx="4" fill="#4dd9f0" opacity=".15"/>
  <rect x="385" y="220" width="340" height="6" rx="2" fill="#333" opacity=".08"/>
  <rect x="385" y="235" width="310" height="6" rx="2" fill="#333" opacity=".08"/>
  <!-- Pen cup with colorful pens -->
  <rect x="20" y="180" width="60" height="100" rx="8" fill="#8a7a6a"/>
  <line x1="30" y1="130" x2="30" y2="180" stroke="#d44" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="140" x2="40" y2="180" stroke="#4a4" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="135" x2="50" y2="180" stroke="#44a" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="145" x2="60" y2="180" stroke="#fa0" stroke-width="3" stroke-linecap="round"/>
  <!-- Plant -->
  <circle cx="90" y="160" r="25" fill="#2d5a3d" opacity=".6"/>
  <circle cx="110" y="150" r="20" fill="#3a7a4d" opacity=".5"/>
  <circle cx="75" y="155" r="18" fill="#2d5a3d" opacity=".5"/>
  <rect x="82" y="180" width="16" height="30" rx="4" fill="#c4946b"/>
  <!-- Coffee mug -->
  <ellipse cx="580" cy="420" rx="35" ry="12" fill="#1a1a2e"/>
  <rect x="545" y="420" width="70" height="50" rx="4" fill="#1a1a2e"/>
  <ellipse cx="580" cy="468" rx="33" ry="8" fill="#16213e"/>
  <!-- Pen on desk -->
  <line x1="480" y1="480" x2="520" y2="380" stroke="#888" stroke-width="3" stroke-linecap="round"/>
  <!-- Plant leaves (background) -->
  <circle cx="110" cy="140" r="15" fill="#3a7a4d" opacity=".4"/>
  <!-- Netflix/brand sticker on laptop -->
  <rect x="640" y="330" width="50" height="20" rx="4" fill="#d44" opacity=".5"/>
</svg>